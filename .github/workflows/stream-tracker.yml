name: Stream Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Tracker çalıştır
        run: node tracker.js

      - name: Kaydet ve pushla
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stream_stats.json
          git commit -m "update stats" || echo "no changes"
          git push
