<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEXMYKO Yayıncıları</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script data-goatcounter="https://apexmykolive.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video autoplay muted loop playsinline id="bg-video">
    <source src="arkaplan.mp4" type="video/mp4">
  </video>

  <div class="bg-overlay"></div>

  <header class="topbar">
    <div class="brand">
      <img src="logo.png" class="site-logo" alt="APEXMYKO Logo">
      <div class="brand-text">
        <div class="brand-title">APEXMYKO</div>
        <div class="brand-sub">VALHALLA SPONSOR YAYINCILAR</div>
      </div>
    </div>

    <div class="social-bar">
      <a href="https://discord.gg/apexmyko" target="_blank" rel="noopener noreferrer"><img src="dc.png" alt="Discord"></a>
      <a href="https://www.instagram.com/apexmyko" target="_blank" rel="noopener noreferrer"><img src="insta.png" alt="Instagram"></a>
      <a href="https://www.youtube.com/@MykoApex" target="_blank" rel="noopener noreferrer"><img src="yt.png" alt="YouTube"></a>
      <a href="https://kick.com/apex-myko" target="_blank" rel="noopener noreferrer"><img src="kk.png" alt="Kick"></a>
      <a href="https://www.facebook.com/ApexMyko/" target="_blank" rel="noopener noreferrer"><img src="fb.png" alt="Facebook"></a>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <img src="banner.png" class="hero-banner" alt="APEXMYKO Banner">
    </section>

    <section class="columns">
      <div class="column top10-column">
        <div class="section-head">
          <h2>Yayıncı Top 10</h2>
        </div>
        <div class="top10-list"></div>
      </div>

      <div class="column streamers-column">
        <div class="section-head">
          <h2>Tüm Yayıncılar</h2>
        </div>
        <div class="channel-list all-list"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
