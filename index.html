<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yayıncı Top 10</title>

<style>
body {
  background: radial-gradient(circle at top, #0b1d3a, #020617);
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 400px;
  background: rgba(0,0,0,0.5);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

.title {
  text-align: center;
  font-size: 24px;
  margin-bottom: 20px;
  color: gold;
}

.rank-item {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  align-items: center;
}

.rank-item span {
  font-size: 14px;
}

.live {
  color: #00ff88;
  font-weight: bold;
}

.offline {
  color: gray;
}

.top1 {
  background: linear-gradient(90deg, gold, orange);
  color: black;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
  <div class="title">🔥 Yayıncı Top 10</div>
  <div id="top10"></div>
</div>

<script>
async function loadStreamers() {
  const res = await fetch("https://yayincilarimiz.apexmykolive.workers.dev");
  const data = await res.json();

  const sorted = Object.entries(data)
    .sort((a, b) => b[1].minutes - a[1].minutes)
    .slice(0, 10);

  const container = document.getElementById("top10");
  container.innerHTML = "";

  sorted.forEach(([name, info], index) => {
    const div = document.createElement("div");
    div.className = "rank-item " + (index === 0 ? "top1" : "");

    div.innerHTML = `
      <span>#${index + 1}</span>
      <span>${name}</span>
      <span>${info.minutes} dk</span>
      <span class="${info.live ? 'live' : 'offline'}">
        ${info.live ? '● CANLI' : 'OFFLINE'}
      </span>
    `;

    container.appendChild(div);
  });
}

loadStreamers();
setInterval(loadStreamers, 60000);
</script>

</body>
</html>
