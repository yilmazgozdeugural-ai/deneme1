<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexMyko Yayıncılar</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0b1d3a, #020617);
  font-family: Arial;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

/* KART */
.card {
  background: rgba(0,0,0,0.5);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

/* BAŞLIK */
.title {
  text-align: center;
  font-size: 28px;
  color: gold;
  margin-bottom: 30px;
}

/* TOP 10 */
.top-row {
  display: grid;
  grid-template-columns: 60px 1fr 120px;
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.top-row:last-child {
  border-bottom: none;
}

.rank {
  color: gold;
  font-weight: bold;
}

.time {
  text-align: right;
  color: #ffd86b;
  font-weight: bold;
}

/* STREAMER */
.streamer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.streamer:last-child {
  border-bottom: none;
}

.status.live {
  color: #ff4d4f;
  font-weight: bold;
}

.status.offline {
  color: #aaa;
}

.btn {
  background: gold;
  border: none;
  padding: 6px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">APEXMYKO YAYINCILARI</div>

  <!-- TOP10 -->
  <div class="card">
    <h3>Yayıncı Top 10</h3>
    <div id="top10-list">Yükleniyor...</div>
  </div>

  <!-- TÜM YAYINCILAR -->
  <div class="card">
    <h3>Tüm Yayıncılar</h3>
    <div id="streamer-list">Yükleniyor...</div>
  </div>

</div>

<script>
fetch("https://yayincilarimiz.apexmykolive.workers.dev/")
  .then(res => res.json())
  .then(data => {

    const topList = document.getElementById("top10-list");
    const streamerList = document.getElementById("streamer-list");

    topList.innerHTML = "";
    streamerList.innerHTML = "";

    // TOP 10
    data.forEach((item, index) => {
      const row = document.createElement("div");
      row.className = "top-row";

      row.innerHTML = `
        <div class="rank">#${index + 1}</div>
        <div>${item.name}</div>
        <div class="time">${item.hoursText}</div>
      `;

      topList.appendChild(row);
    });

    // STREAMERS
    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "streamer";

      div.innerHTML = `
        <div>
          <strong>${item.name}</strong><br>
          <span class="status ${item.live ? "live" : "offline"}">
            ${item.live ? "🔴 CANLI" : "⚫ OFFLINE"}
          </span>
        </div>
        <a href="${item.url}" target="_blank">
          <button class="btn">Kanala Git</button>
        </a>
      `;

      streamerList.appendChild(div);
    });

  });
</script>

</body>
</html>
